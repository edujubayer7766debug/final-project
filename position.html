<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        .container {
            position: relative;
            width: 10px;
            height: 10px;
            border: 1px dotted #ccc;
        }
        .boy {
            position: sticky;
            top: 10px;
            left: 10px;
            height: 50px; 
            width: 50px;
        }       
        .ring {
            position: relative;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
        }
        .water {
            position: sticky;
            top: 50px;
            left: 10px;
        }
       </style>
</head>
<body>
    <ul>
        <li>static</li>
        <li>relative</li>
        <li>absolute</li>
        <li>fixed</li>
        <li>sticky</li>
    </ul>
    <div class="container">
        <div class="boy" ><img src="images/boy.jpg.jpg" alt="" style="width: 50px; height: 50px;"></div>
        <div class="ring"><img src="images/ring.jpg.jpg" alt="" style="width: 50px; height: 50px;"></div>
        <div class="water"><img src="images/water.jpg.jpg" alt="" style="width: 50px; height: 50px;"></div>
    </div>
    <div class="box">
        <div>
            <ol>
                <li>1</li>
                <li>2</li>
                <li>3</li>
                <li>4</li>
                <li>5</li>
                <li>6</li>
                <li>7</li>
                <li>8</li>
                <li>9</li>
                <li>10</li>
            </ol>
        </div>
    </div>
</body>
</html>
